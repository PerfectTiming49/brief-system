<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opportunity Brief</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .chip { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; margin-right: 4px; }
  .new-badge { background: #10b981; color: white; font-weight: 600; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
  .stale { opacity: 0.55; }
</style>
</head>
<body class="bg-slate-50 min-h-screen">
<div class="max-w-7xl mx-auto p-6">
  <header class="mb-6">
    <h1 class="text-3xl font-bold text-slate-900">Opportunity Brief</h1>
    <p id="generated-at" class="text-sm text-slate-500 mt-1">Loading…</p>
  </header>

  <!-- Coverage Report -->
  <section id="coverage" class="mb-6 bg-white rounded-lg shadow-sm p-4">
    <h2 class="text-sm font-semibold text-slate-700 mb-2">Coverage</h2>
    <div id="coverage-content" class="text-sm text-slate-600"></div>
  </section>

  <!-- Filters -->
  <section class="mb-6 bg-white rounded-lg shadow-sm p-4">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
      <div>
        <label class="block text-xs font-medium text-slate-700 mb-1">Search</label>
        <input id="search" type="text" placeholder="Firm, role, keyword…"
               class="w-full border border-slate-300 rounded px-3 py-2 text-sm">
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-700 mb-1">Min fit score</label>
        <select id="min-fit" class="w-full border border-slate-300 rounded px-3 py-2 text-sm">
          <option value="0">All</option>
          <option value="6">6+</option>
          <option value="7" selected>7+</option>
          <option value="8">8+</option>
          <option value="9">9+</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-700 mb-1">Show</label>
        <select id="show-filter" class="w-full border border-slate-300 rounded px-3 py-2 text-sm">
          <option value="all">All results</option>
          <option value="new">New since yesterday</option>
          <option value="week">New this week</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-700 mb-1">Sort by</label>
        <select id="sort-by" class="w-full border border-slate-300 rounded px-3 py-2 text-sm">
          <option value="fit">Fit score</option>
          <option value="date">Date posted</option>
          <option value="deadline">Deadline</option>
        </select>
      </div>
    </div>
  </section>

  <!-- Scholarships -->
  <section class="mb-8">
    <h2 class="text-xl font-bold text-slate-900 mb-3">
      Scholarships <span id="scholarship-count" class="text-sm font-normal text-slate-500"></span>
    </h2>
    <div id="scholarships" class="space-y-3"></div>
  </section>

  <!-- Jobs -->
  <section>
    <h2 class="text-xl font-bold text-slate-900 mb-3">
      Jobs & Internships <span id="job-count" class="text-sm font-normal text-slate-500"></span>
    </h2>
    <div id="jobs" class="space-y-3"></div>
  </section>
</div>

<script>
let allData = { scholarships: [], jobs: [], coverage: {}, generated_at: "" };

async function load() {
  try {
    const res = await fetch("results.json?t=" + Date.now());
    allData = await res.json();
    document.getElementById("generated-at").textContent =
      `Last updated: ${allData.generated_at || "unknown"}`;
    renderCoverage();
    render();
  } catch (e) {
    document.getElementById("generated-at").textContent = "No data yet — waiting for first scrape.";
  }
}

function renderCoverage() {
  const c = allData.coverage || {};
  const total = (c.ats || 0) + (c.scrape || 0) + (c.linkedin || 0) + (c.none || 0);
  document.getElementById("coverage-content").innerHTML = `
    <div class="flex gap-4 flex-wrap">
      <span><span class="chip bg-green-100 text-green-800">ATS API</span> ${c.ats || 0}</span>
      <span><span class="chip bg-blue-100 text-blue-800">Scraped</span> ${c.scrape || 0}</span>
      <span><span class="chip bg-yellow-100 text-yellow-800">LinkedIn</span> ${c.linkedin || 0}</span>
      <span><span class="chip bg-red-100 text-red-800">No coverage</span> ${c.none || 0}</span>
      <span class="text-slate-500">of ${total} firms</span>
    </div>`;
}

function isNewSince(dateStr, days) {
  if (!dateStr) return false;
  const d = new Date(dateStr);
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  return d >= cutoff;
}

function filterAndSort(items, kind) {
  const q = document.getElementById("search").value.toLowerCase();
  const minFit = parseInt(document.getElementById("min-fit").value);
  const show = document.getElementById("show-filter").value;
  const sortBy = document.getElementById("sort-by").value;

  let out = items.filter(i => {
    const blob = JSON.stringify(i).toLowerCase();
    if (q && !blob.includes(q)) return false;
    if (kind === "jobs" && (i.fit_score || 0) < minFit) return false;
    if (show === "new" && !isNewSince(i._seen_at, 1)) return false;
    if (show === "week" && !isNewSince(i._seen_at, 7)) return false;
    return true;
  });

  out.sort((a, b) => {
    if (sortBy === "fit") return (b.fit_score || 0) - (a.fit_score || 0);
    if (sortBy === "date") return (b._seen_at || "").localeCompare(a._seen_at || "");
    if (sortBy === "deadline") return (a.deadline || "9999").localeCompare(b.deadline || "9999");
    return 0;
  });
  return out;
}

function jobCard(j) {
  const isNew = isNewSince(j._seen_at, 1);
  const fitColor = j.fit_score >= 9 ? "bg-green-500" :
                   j.fit_score >= 7 ? "bg-blue-500" : "bg-slate-400";
  return `
    <article class="bg-white rounded-lg shadow-sm p-4 hover:shadow-md transition">
      <div class="flex justify-between items-start mb-2">
        <div class="flex-1">
          <div class="flex items-center gap-2 mb-1">
            ${isNew ? '<span class="new-badge">NEW</span>' : ''}
            <span class="text-xs font-semibold text-slate-500 uppercase tracking-wide">${j.firm || ""}</span>
          </div>
          <h3 class="font-semibold text-slate-900">
            <a href="${j.url}" target="_blank" class="hover:text-blue-600">${j.title || "(no title)"}</a>
          </h3>
          <p class="text-sm text-slate-600 mt-1">${j.location || ""}</p>
        </div>
        <div class="flex flex-col items-end ml-4">
          <div class="flex items-center gap-1 mb-1">
            <span class="${fitColor} text-white text-xs font-bold px-2 py-1 rounded">${j.fit_score || "?"}/10</span>
          </div>
          ${j.deadline ? `<span class="text-xs text-red-600">Deadline: ${j.deadline}</span>` : ""}
        </div>
      </div>
      ${j.reason ? `<p class="text-sm text-slate-700 mt-2 italic">${j.reason}</p>` : ""}
    </article>`;
}

function scholarshipCard(s) {
  const isNew = isNewSince(s._seen_at, 1);
  return `
    <article class="bg-white rounded-lg shadow-sm p-4 hover:shadow-md transition">
      <div class="flex items-center gap-2 mb-1">
        ${isNew ? '<span class="new-badge">NEW</span>' : ''}
        <span class="text-xs font-semibold text-slate-500 uppercase tracking-wide">${s.intake_year || "Scholarship"}</span>
      </div>
      <h3 class="font-semibold text-slate-900">
        <a href="${s.url}" target="_blank" class="hover:text-blue-600">${s.name}</a>
      </h3>
      ${s.reason ? `<p class="text-sm text-slate-700 mt-2">${s.reason}</p>` : ""}
      ${s.deadline ? `<p class="text-xs text-red-600 mt-2">Deadline: ${s.deadline}</p>` : ""}
    </article>`;
}

function render() {
  const schols = filterAndSort(allData.scholarships || [], "scholarships");
  const jobs = filterAndSort(allData.jobs || [], "jobs");
  document.getElementById("scholarship-count").textContent = `(${schols.length})`;
  document.getElementById("job-count").textContent = `(${jobs.length})`;
  document.getElementById("scholarships").innerHTML =
    schols.length ? schols.map(scholarshipCard).join("") :
    '<p class="text-sm text-slate-500 italic">No scholarships match current filters.</p>';
  document.getElementById("jobs").innerHTML =
    jobs.length ? jobs.map(jobCard).join("") :
    '<p class="text-sm text-slate-500 italic">No jobs match current filters.</p>';
}

document.getElementById("search").addEventListener("input", render);
document.getElementById("min-fit").addEventListener("change", render);
document.getElementById("show-filter").addEventListener("change", render);
document.getElementById("sort-by").addEventListener("change", render);

load();
</script>
</body>
</html>
