name: Opportunity Scrape

on:
  schedule:
    - cron: '0 12 * * 1,3,5'   # Mon/Wed/Fri at 8 AM EST = 12:00 UTC  # Every 3 days at 8 AM EST
  workflow_dispatch:        # lets you run it manually from GitHub UI

permissions:
  contents: write           # needed to commit results.json back

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/scraper.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/results.json
          git diff --staged --quiet || git commit -m "chore: daily scrape [skip ci]"
          git push
